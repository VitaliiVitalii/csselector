<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinner shopping list</title>
    <link rel="icon" href="./img/favicon.png">
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <header>
        <div class="header_contents">
            <h1 class="header_title">CSS Dinner Shopping List</h1>
            <p class="header_text">Let’s go to the mall!</p>
        </div>
    </header> 
    <main>
        <div class="list_contents">
            <ul class="list_form" action="#" name="check_list"> 
                <li class="list_item">
                    <input type="checkbox" value="yes" name="check_list" id="first_item">
                    <label for="first_item">
                        A lot of pickles
                        <span class="item_comment">for the next lessons about CSS</span>
                    </label>
                </li>
                <li class="list_item">
                    <input type="checkbox" value="yes" name="check_list" id="second_item">
                    <label for="second_item">
                        10 apples
                        <span class="item_comment">for more CSS manipulations</span>
                    </label>
                </li>
                <li class="list_item">
                    <input type="checkbox" value="yes" name="check_list" id="third_item">
                    <label for="third_item">
                        20 oranges
                        <span class="item_comment">because they are awesome</span>
                    </label>
                </li>
                <li class="list_item">
                    <input type="checkbox" value="yes" name="check_list" id="four_item">
                    <label for="four_item">
                        13 plates
                        <span class="item_comment">hm... they always dissapear</span>
                    </label>
                </li>
                <li class="list_item">
                    <input type="checkbox" value="yes" name="check_list" id="fifth_item">
                    <label for="fifth_item">15 bentos</label>
                </li>
                <li class="list_item">
                    <input type="checkbox" value="yes" name="check_list" id="six_item">
                    <label for="six_item">
                        1 bottle of Sake
                        <span class="item_comment">for my friends</span>
                    </label>
                </li>
            </ul>
        </div>
    </main>
    <footer class="list_foorer">
        <p>Bon appetit :)</p>
    </footer>
</body>
</html>
